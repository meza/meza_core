name: build
on:
    pull_request:
        types: [ opened, synchronize, reopened ]
    push:

permissions:
  issues: write
  checks: write
  contents: write
  pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
  build:
    runs-on: meza-ubuntu-slim
    steps:
      - name: "⬇️ Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "☕ Setup Jdk 25"
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          cache: 'gradle'
          cache-dependency-path: |
            versions/*.properties
            *.properties
            *.gradle.kts
          java-version: 25
          check-latest: true
          distribution: 'temurin'

      - name: "🛂 Setup Gradle"
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: "🔓 Adjust the release permissions"
        run: chmod a+x ./scripts/release.sh && chmod +x ./gradlew

      - name: "🧵 Install semantic release"
        run: npm i --location=global semantic-release @meza/mezas-conventional-changelog semantic-release-discord-notifier conventional-changelog-conventionalcommits @semantic-release/github @semantic-release/changelog @semantic-release/exec semantic-release-export-data semantic-release-discord

      - name: "🔢 Determine version"
        run: npx semantic-release --dry-run
        id: get-next-version
        env:
          GH_TOKEN: ${{ github.token }}

      - name: "ℹ️ Needs Release?"
        run: echo "Needs release published? ${{ steps.get-next-version.outputs.new_release_published == 'true' }}"

      - name: "🏗️ Build & Release to GitHub"
        if: ${{ steps.get-next-version.outputs.new-release-published == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          DO_PUBLISH: steps.get-next-version.outputs.new-release-published
          MEZA_MAVEN_USER: ${{ secrets.MEZA_MAVEN_USER }}
          MEZA_MAVEN_PASSWORD: ${{ secrets.MEZA_MAVEN_PASSWORD }}
        run: npx semantic-release

      - name: "🧪 Run Dev Build"
        if: ${{ steps.get-next-version.outputs.new_release_published != 'true' }}
        run: ./gradlew buildAndCollect --stacktrace

      - name: "🕵️‍♂️ Collect jars"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Artifacts
          path: |
            build/libs/*.jar
            build/reports/**/*

