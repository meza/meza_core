name: Update Supporters List

on:
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  BRANCH_NAME: "update/patrons"
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  update-readme:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Update supporters list
        uses: meza/action-patrons@718ac10c3fd06e3fec986f4655bdf776fd3640d3 # v1.0.19

