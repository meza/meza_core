name: Update Supporters List

on:
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  BRANCH_NAME: "update/patrons"
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  update-readme:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Update supporters list
        uses: meza/action-patrons@v1.0.17

